# Production stack: same app, fronted by Caddy for automatic HTTPS.
#
# Single subdomain (e.g. notes.cardenas.pe):
#   /api/*  -> backend (Django/DRF)
#   /*      -> frontend (Next.js)
# Caddy obtains and renews a Let's Encrypt certificate automatically.
#
# Usage (on the server):
#   cp .env.prod.example .env && edit it
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#   docker compose -f docker-compose.prod.yml exec backend python manage.py seed_demo --force

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notes"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://notes:${POSTGRES_PASSWORD}@db:5432/notes
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DOMAIN}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      args:
        # Same-origin: the browser calls https://<domain>/api/v1, Caddy routes it.
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api/v1
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
