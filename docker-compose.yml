# Turbo Notes — full stack with a single `docker compose up --build`.
#
# Service topology:
#   db       Postgres 16, with a named volume and a pg_isready healthcheck
#   backend  Django/DRF (gunicorn :8000) — waits for db to be HEALTHY, runs
#            migrations on boot (entrypoint.sh), exposed on host :8000
#   frontend Next.js standalone server (:3000) — NEXT_PUBLIC_API_URL is a
#            BUILD ARG because Next inlines NEXT_PUBLIC_* at build time.
#            It points at localhost:8000 (not the service name) because the
#            API is called from the user's BROWSER, not from the container.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
      POSTGRES_DB: notes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notes"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://notes:notes@db:5432/notes
      # Also signs the JWTs (simplejwt default) — auth added no new env vars.
      DJANGO_SECRET_KEY: compose-dev-only-secret-key-change-in-prod
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      # Optional AI transcription (Whisper). Empty -> disabled (free browser dictation).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
