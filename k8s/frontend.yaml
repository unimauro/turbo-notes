apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: turbo-notes
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          # Built with --build-arg NEXT_PUBLIC_API_URL=https://notes.cardenas.pe/api/v1
          image: ghcr.io/unimauro/turbo-notes-frontend:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 300m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: turbo-notes
spec:
  selector: { app: frontend }
  ports:
    - port: 3000
      targetPort: 3000
