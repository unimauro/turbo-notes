# Demo-only database. In real production, DELETE this file and point DATABASE_URL
# at a managed Postgres (RDS / Cloud SQL) with backups, failover and a read replica.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: turbo-notes
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: notes
            - name: POSTGRES_DB
              value: notes
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: backend-secrets, key: POSTGRES_PASSWORD }
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: turbo-notes
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
