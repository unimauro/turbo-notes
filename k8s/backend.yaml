apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: turbo-notes
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/unimauro/turbo-notes-backend:latest # built/pushed by CI
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: backend-config }
            - secretRef: { name: backend-secrets }
          readinessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { cpu: 500m, memory: 384Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: turbo-notes
spec:
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: turbo-notes
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
