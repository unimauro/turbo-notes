# Non-secret config + secrets. Edit before applying; in real prod the Secret
# should come from a sealed-secrets / external-secrets / cloud secret manager,
# never committed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: turbo-notes
data:
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "notes.cardenas.pe"
  CORS_ALLOWED_ORIGINS: "https://notes.cardenas.pe"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: turbo-notes
type: Opaque
stringData:
  # Point at a managed Postgres in real prod.
  DATABASE_URL: "postgres://notes:CHANGE_ME@postgres:5432/notes"
  DJANGO_SECRET_KEY: "CHANGE_ME_LONG_RANDOM"
  POSTGRES_PASSWORD: "CHANGE_ME"
